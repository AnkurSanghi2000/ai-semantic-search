<!DOCTYPE html>
<html>
<head>
    <title>AI Semantic Search</title>
    <style>
        body {
            font-family: Arial;
            max-width: 800px;
            margin: auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        input, button {
            padding: 10px;
            margin: 5px;
            width: 100%;
        }

        .result {
            border: 1px solid #ddd;
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
        }

        .score {
            color: green;
            font-size: 12px;
        }
    </style>
</head>

<body>

<h1>🔍 AI Semantic Search</h1>

<!-- SEARCH -->
<h3>Search</h3>
<input id="query" placeholder="Enter your query..." />
<button onclick="search()">Search</button>

<div id="results"></div>

<hr>

<!-- ADD DOCUMENT -->
<h3>Add Document</h3>
<input id="newDoc" placeholder="Enter new document..." />
<button onclick="addDoc()">Add</button>

<p id="status"></p>

<script>
async function search() {
    const query = document.getElementById("query").value;

    const response = await fetch("/search", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ query: query, top_k: 5 })
    });

    const data = await response.json();

    const resultsDiv = document.getElementById("results");
    resultsDiv.innerHTML = "";

    data.results.forEach(r => {
        const div = document.createElement("div");
        div.className = "result";

        div.innerHTML = `
            <p>${r.content}</p>
            <p class="score">Similarity: ${r.similarity}</p>
        `;

        resultsDiv.appendChild(div);
    });
}

async function addDoc() {
    const text = document.getElementById("newDoc").value;

    const response = await fetch("/add", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ text: text })
    });

    const data = await response.json();

    document.getElementById("status").innerText = "✅ Added!";
}
</script>

</body>
</html>
